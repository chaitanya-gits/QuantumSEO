<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Search Engine</title>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --panel-soft: #f8f9fa;
      --text: #202124;
      --muted: #70757a;
      --line: #e8eaed;
      --shadow: 0 8px 26px rgba(60, 64, 67, 0.12);
      --shadow-soft: 0 2px 10px rgba(60, 64, 67, 0.08);
      --blue: #1a73e8;
      --chip: #f1f3f4;
      --chip-hover: #e8f0fe;
      --history: #5f6368;
      font-family: Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      min-height: 100vh;
      padding: 0 0 80px;
    }

    .hero {
      display: grid;
      justify-items: center;
      gap: 18px;
      min-height: 78vh;
      align-content: center;
      padding-top: 12px;
    }

    .brand {
      margin: 0;
      font-size: clamp(2.6rem, 7vw, 4.8rem);
      font-weight: 600;
      letter-spacing: -0.06em;
      color: #dadce0;
      text-shadow: 0 1px 0 #fff;
    }

    .brand strong {
      color: #202124;
      font-weight: 600;
    }

    .subcopy {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
      text-align: center;
      max-width: 600px;
      line-height: 1.6;
    }

    .search-stage {
      width: min(820px, 100%);
      margin-top: 18px;
      position: relative;
    }

    .search-card {
      position: relative;
      overflow: visible;
    }

    .search-shell.is-voice-mode {
      grid-template-columns: 24px 24px 1fr auto 32px;
    }

    .search-shell.is-voice-mode > * {
      grid-row: 1;
    }

    .search-shell.is-voice-mode #attachButton {
      grid-column: 1;
    }

    .search-shell.is-voice-mode > svg {
      grid-column: 2;
    }

    .search-shell.is-voice-mode .query-input {
      grid-column: 3;
    }

    .voice-feedback {
      position: static;
      display: none;
      align-items: center;
      gap: 10px;
      justify-self: end;
      padding: 0;
      min-width: 0;
      grid-column: 4;
    }

    .voice-feedback.is-visible {
      display: inline-flex;
    }

    .voice-stop {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 0;
      border-radius: 12px;
      background: #d2e3fc;
      color: #1a73e8;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
    }

    .voice-stop.is-visible {
      display: inline-flex;
    }

    .voice-stop-dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }

    .voice-stop-dots span {
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: currentColor;
      animation: voiceDotPulse 1s ease-in-out infinite;
    }

    .voice-stop-dots span:nth-child(2) { animation-delay: 0.15s; }
    .voice-stop-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes voiceDotPulse {
      0%, 100% { opacity: 0.35; transform: scale(0.75); }
      50% { opacity: 1; transform: scale(1); }
    }

    .search-shell.is-voice-mode #voiceButton,
    .search-shell.is-voice-mode #clearButton {
      display: none;
    }

    .search-shell.is-voice-mode #searchButton {
      grid-column: 5;
      margin-left: 8px;
      justify-self: end;
    }

    .search-shell {
      display: grid;
      grid-template-columns: 24px 24px 1fr 24px 24px 32px;
      align-items: center;
      gap: 12px;
      min-height: 62px;
      padding: 0 20px;
      border-radius: 999px;
      background: var(--panel);
      box-shadow: var(--shadow);
      border: 1px solid rgba(232, 234, 237, 0.9);
    }

    .search-shell.is-loading {
      border-color: #d2e3fc;
      box-shadow: 0 10px 28px rgba(26, 115, 232, 0.16);
    }

    .search-shell svg {
      width: 18px;
      height: 18px;
      stroke: var(--muted);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .query-input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 1rem;
      line-height: 1.4;
      padding: 0;
    }

    .query-input::placeholder {
      color: #b6b9bd;
    }

    .query-input:disabled {
      cursor: progress;
    }

    .icon-button {
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
      display: grid;
      place-items: center;
      color: var(--muted);
    }

    .plus-button {
      color: var(--muted);
      font-size: 1.45rem;
      line-height: 1;
    }

    .plus-button:hover {
      color: var(--text);
    }

    .clear-button {
      font-size: 1.1rem;
      line-height: 1;
      visibility: hidden;
    }

    .clear-button.is-visible {
      visibility: visible;
    }

    .search-submit {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background: var(--blue);
      color: #ffffff;
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    .search-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(26, 115, 232, 0.26);
      background: #1765cc;
    }

    .search-submit svg {
      stroke: currentColor;
    }

    .attach-menu {
      position: absolute;
      top: calc(100% + 12px);
      left: 0;
      min-width: 260px;
      padding: 10px;
      background: #ffffff;
      border: 1px solid rgba(232, 234, 237, 0.95);
      border-radius: 20px;
      box-shadow: var(--shadow);
      display: none;
      z-index: 30;
    }

    .attach-menu.is-open {
      display: block;
    }

    .attach-option {
      width: 100%;
      display: grid;
      grid-template-columns: 26px 1fr;
      align-items: center;
      gap: 14px;
      border: 0;
      background: transparent;
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      text-align: left;
      font-size: 0.98rem;
    }

    .attach-option:hover {
      background: #f8f9fa;
    }

    .attach-option svg {
      width: 20px;
      height: 20px;
      stroke: var(--muted);
      fill: none;
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.95;
    }

    .suggest-panel {
      display: none;
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      right: 0;
      z-index: 20;
      background: #ffffff;
      padding: 8px 0 10px;
      border: 1px solid rgba(232, 234, 237, 0.95);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    .suggest-panel.is-open {
      display: block;
    }

    .suggest-group {
      padding: 0 10px 6px;
    }

    .suggest-label {
      display: block;
      padding: 8px 12px 6px;
      color: #9aa0a6;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .suggest-label.trending-label {
      text-transform: none;
      letter-spacing: 0;
      font-size: 0.98rem;
      font-weight: 500;
      color: var(--muted);
      padding-top: 4px;
    }

    .suggest-item {
      width: 100%;
      display: grid;
      grid-template-columns: 18px 1fr auto;
      align-items: center;
      gap: 12px;
      border: 0;
      background: transparent;
      padding: 10px 12px;
      border-radius: 14px;
      color: var(--text);
      text-align: left;
      cursor: pointer;
    }

    .suggest-item:hover,
    .suggest-item.is-active {
      background: #f8f9fa;
    }

    .suggest-item .item-icon {
      color: var(--history);
      font-size: 1rem;
      line-height: 1;
      text-align: center;
    }

    .suggest-item .item-text {
      font-size: 1rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .suggest-item .item-type {
      color: #9aa0a6;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .results-section {
      width: min(760px, 100%);
      margin: 40px auto 0;
      display: grid;
      gap: 18px;
    }





    .ai-answer {
      display: none;
      padding: 18px 20px;
      border-radius: 22px;
      background: linear-gradient(180deg, #ffffff, #f8fbff);
      border: 1px solid #d7e3fc;
      box-shadow: var(--shadow-soft);
    }

    .ai-answer.is-visible {
      display: block;
    }

    .answer-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--blue);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .overview-body {
      display: grid;
      gap: 18px;
    }

    .overview-section {
      display: grid;
      gap: 10px;
    }

    .overview-heading {
      margin: 0;
      color: var(--text);
      font-size: 1.02rem;
      font-weight: 700;
    }

    .overview-text {
      margin: 0;
      line-height: 1.7;
      color: var(--text);
    }

    .overview-list {
      margin: 0;
      padding-left: 20px;
      color: var(--text);
      line-height: 1.7;
    }

    .overview-list li {
      margin-bottom: 8px;
    }

    .overview-table {
      width: 100%;
      border-collapse: collapse;
      border-spacing: 0;
      overflow: hidden;
      border: 1px solid #d7e3fc;
      border-radius: 16px;
      background: #ffffff;
    }

    .overview-table th,
    .overview-table td {
      padding: 10px 12px;
      text-align: left;
      font-size: 0.9rem;
      line-height: 1.5;
      border-bottom: 1px solid #e8eefc;
      vertical-align: top;
    }

    .overview-table th {
      color: var(--muted);
      font-weight: 700;
      background: #f8fbff;
    }

    .overview-table tr:last-child td {
      border-bottom: 0;
    }

    .overview-table a {
      color: var(--blue);
      text-decoration: none;
    }

    .overview-table a:hover {
      text-decoration: underline;
    }

    .citations {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .citation {
      color: var(--blue);
      text-decoration: none;
      font-size: 0.88rem;
    }

    .results-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .status-pill {
      display: none;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      background: #eef3fd;
      color: var(--blue);
      font-size: 0.82rem;
      font-weight: 600;
    }

    .status-pill.is-visible {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .results-list {
      display: grid;
      gap: 18px;
    }

    .result-card {
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .result-url {
      color: var(--muted);
      font-size: 0.84rem;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .result-title {
      margin: 0 0 8px;
      font-size: 1.28rem;
      font-weight: 500;
      line-height: 1.3;
    }

    .result-title a {
      color: var(--blue);
      text-decoration: none;
    }

    .result-title a:hover {
      text-decoration: underline;
    }

    .result-snippet {
      margin: 0;
      color: #4d5156;
      font-size: 0.95rem;
      line-height: 1.7;
    }

    .related-row {
      display: none;
      gap: 12px;
    }

    .related-row.is-visible {
      display: flex;
      flex-wrap: wrap;
    }

    .related-label {
      display: none;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 600;
    }

    .related-label.is-visible {
      display: block;
    }

    .related-chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--text);
      padding: 10px 14px;
      font-size: 0.86rem;
      cursor: pointer;
      transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
    }

    .related-chip:hover {
      background: var(--chip-hover);
      border-color: #d2e3fc;
      transform: translateY(-1px);
    }

    .location-card {
      width: min(560px, calc(100% - 24px));
      margin: 72px auto 0;
      padding: 18px 20px;
      border-radius: 22px;
      background: linear-gradient(180deg, #ffffff, #f8fbff);
      border: 1px solid #d7e3fc;
      box-shadow: var(--shadow-soft);
      text-align: center;
    }

    .location-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--blue);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .location-text {
      margin: 0;
      color: var(--text);
      line-height: 1.7;
    }

    .location-meta {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .empty-state {
      color: var(--muted);
      font-size: 0.92rem;
      text-align: center;
      padding: 24px 12px 0;
    }

    .history-delete {
      border: 0;
      background: transparent;
      color: #9aa0a6;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 4px;
      border-radius: 999px;
    }

    .history-delete:hover {
      background: #f1f3f4;
      color: var(--text);
    }

    @media (max-width: 640px) {
      .page {
        width: calc(100% - 20px);
        padding-top: 0;
      }

      .search-stage,
      .results-section {
        width: 100%;
      }

      .location-card {
        width: 100%;
        margin-top: 56px;
      }

      .search-shell {
        min-height: 54px;
        padding: 0 14px;
        gap: 10px;
      }

      .brand {
        font-size: 2.5rem;
      }

      .hero {
        min-height: 70vh;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1 class="brand"><strong>[Quinfosys</strong> Search]</h1>

      <div class="search-stage">
        <div class="search-card">
          <div class="search-shell">
            <button id="attachButton" class="icon-button plus-button" type="button" aria-label="Upload image or file">+</button>

            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="6"></circle>
              <path d="M20 20l-4.2-4.2"></path>
            </svg>

            <input
              id="query"
              class="query-input"
              type="text"
              placeholder="Search anything"
              autocomplete="off"
              aria-label="Search query"
              aria-controls="suggestPanel"
              aria-expanded="false"
            />

            <button id="voiceButton" class="icon-button" type="button" aria-label="Voice search">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 4a3 3 0 0 1 3 3v4a3 3 0 0 1-6 0V7a3 3 0 0 1 3-3z"></path>
                <path d="M19 11a7 7 0 0 1-14 0"></path>
                <path d="M12 18v3"></path>
              </svg>
            </button>

            <button id="clearButton" class="icon-button clear-button" type="button" aria-label="Clear search">×</button>

            <button id="searchButton" class="icon-button search-submit" type="button" aria-label="Run search">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 12h12"></path>
                <path d="M13 6l6 6-6 6"></path>
              </svg>
            </button>
            <div id="voiceFeedback" class="voice-feedback" aria-live="polite">
              <button id="voiceStopButton" class="voice-stop" type="button" aria-label="Stop recording">
                <span class="voice-stop-dots" aria-hidden="true">
                  <span></span>
                  <span></span>
                  <span></span>
                </span>
                <span>Stop</span>
              </button>
            </div>
          </div>

          <div id="attachMenu" class="attach-menu">
            <button id="uploadImageButton" class="attach-option" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                <circle cx="9" cy="10" r="1.5"></circle>
                <path d="M21 15l-4-4-7 7"></path>
                <path d="M16 3v6"></path>
                <path d="M13 6h6"></path>
              </svg>
              <span>Upload image</span>
            </button>

            <button id="uploadFileButton" class="attach-option" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 7v10a4 4 0 0 0 8 0V6a3 3 0 1 0-6 0v10a2 2 0 0 0 4 0V8"></path>
              </svg>
              <span>Upload file</span>
            </button>
          </div>

          <input id="imagePicker" type="file" hidden multiple accept="image/*" />
          <input id="filePicker" type="file" hidden multiple accept=".pdf,.doc,.docx,.txt,.csv,.xlsx,.xls,.json" />

          <div id="suggestPanel" class="suggest-panel" role="listbox"></div>
        </div>
      </div>
    </section>

    <section class="results-section">
      <article id="aiAnswer" class="ai-answer" aria-live="polite">
        <div class="answer-label">AI Overview</div>
        <div id="answerText" class="overview-body"></div>
        <div id="citations" class="citations"></div>
      </article>

      <div class="results-head" id="resultsHead">
        <div id="statusPill" class="status-pill"></div>
      </div>

      <div id="relatedLabel" class="related-label">Suggested questions</div>
      <div id="relatedRow" class="related-row"></div>
      <div id="results" class="results-list"></div>
      <div id="emptyState" class="empty-state"></div>
    </section>

    <section class="location-card" aria-live="polite">
      <div class="location-label">Live location</div>
      <p id="locationText" class="location-text">Waiting for browser location permission.</p>
      <div id="locationMeta" class="location-meta"></div>
    </section>
  </main>

  <script>
    const staticDataset = {
      "what is reciprocal rank fusion in search?": {
        answer:
          "Reciprocal Rank Fusion combines multiple ranked lists by assigning each result a position-based contribution from every retrieval method. It is effective for hybrid search because BM25 and vector retrieval can each elevate useful documents without requiring raw score normalization.",
        citations: [
          "https://example.com/rrf",
          "https://example.com/hybrid-search"
        ],
        suggestions: [
          "reciprocal rank fusion formula",
          "rrf in hybrid retrieval",
          "how reranking works after rrf"
        ],
        results: [
          {
            title: "Reciprocal Rank Fusion Explained",
            url: "https://example.com/rrf",
            snippet: "RRF sums a reciprocal score from each ranked list so documents that consistently appear near the top are rewarded, even when ranking systems use incompatible scoring scales."
          },
          {
            title: "Hybrid Retrieval Pipeline",
            url: "https://example.com/hybrid-search",
            snippet: "A practical search stack issues BM25 and dense vector retrieval in parallel, fuses the candidates, then sends the top results to a cross-encoder for final re-ranking."
          },
          {
            title: "Cross-Encoder Re-ranking",
            url: "https://example.com/cross-encoder",
            snippet: "Cross-encoders jointly read the query and each document candidate, improving relevance in the top positions at the cost of latency."
          }
        ],
        relatedQueries: [
          "bm25 vs vector search",
          "what is cross encoder reranking",
          "hybrid retrieval architecture"
        ]
      },
      "bm25 vs vector search": {
        answer:
          "BM25 is best at lexical precision and exact token overlap, while vector retrieval captures semantic similarity across paraphrases and related phrasing. Modern search engines typically combine both and let a reranker refine the top results.",
        citations: [
          "https://example.com/bm25",
          "https://example.com/vector"
        ],
        suggestions: [
          "semantic retrieval examples",
          "when to use bm25",
          "dense retrieval architecture"
        ],
        results: [
          {
            title: "BM25 Sparse Retrieval",
            url: "https://example.com/bm25",
            snippet: "BM25 scores exact and near-exact textual overlap, which makes it strong for precise informational and navigational queries."
          },
          {
            title: "Dense Retrieval with Embeddings",
            url: "https://example.com/vector",
            snippet: "Embedding retrieval matches intent and meaning, enabling better recall for conceptual searches where document wording differs from the user query."
          }
        ],
        relatedQueries: [
          "hybrid retrieval architecture",
          "what is semantic retrieval",
          "why rerank top 50 documents"
        ]
      },
      "how pagerank affects ranking": {
        answer:
          "PageRank contributes an authority prior. It does not replace lexical or semantic relevance, but it can boost documents that are strongly connected in the link graph and therefore more likely to be trusted or important.",
        citations: [
          "https://example.com/pagerank"
        ],
        suggestions: [
          "pagerank formula explained",
          "authority signals in search",
          "freshness vs authority ranking"
        ],
        results: [
          {
            title: "PageRank as Authority Prior",
            url: "https://example.com/pagerank",
            snippet: "PageRank models how authority flows through a link graph and is often used as a secondary signal layered on top of retrieval relevance."
          }
        ],
        relatedQueries: [
          "authority signals in search",
          "bm25 vs vector search",
          "freshness decay ranking"
        ]
      }
    };

    const historyKey = "ai-search-history";
    const queryInput = document.getElementById("query");
    const searchShell = document.querySelector(".search-shell");
    const attachButton = document.getElementById("attachButton");
    const attachMenu = document.getElementById("attachMenu");
    const uploadImageButton = document.getElementById("uploadImageButton");
    const uploadFileButton = document.getElementById("uploadFileButton");
    const imagePicker = document.getElementById("imagePicker");
    const filePicker = document.getElementById("filePicker");
    const voiceButton = document.getElementById("voiceButton");
    const voiceFeedback = document.getElementById("voiceFeedback");
    const voiceStopButton = document.getElementById("voiceStopButton");
    const clearButton = document.getElementById("clearButton");
    const searchButton = document.getElementById("searchButton");
    const suggestPanel = document.getElementById("suggestPanel");
    const answerWrap = document.getElementById("aiAnswer");
    const answerText = document.getElementById("answerText");
    const citationsEl = document.getElementById("citations");
    const resultsEl = document.getElementById("results");
    const relatedRow = document.getElementById("relatedRow");
    const relatedLabel = document.getElementById("relatedLabel");
    const resultsHead = document.getElementById("resultsHead");
    const statusPill = document.getElementById("statusPill");
    const emptyState = document.getElementById("emptyState");
    const locationText = document.getElementById("locationText");
    const locationMeta = document.getElementById("locationMeta");

    let activeItems = [];
    let activeIndex = -1;
    let recognition = null;
    let liveSuggestions = [];
    let answerTypingTimer = null;
    let answerTypingToken = 0;
    let searchController = null;
    let activeSearchToken = 0;
    let lastSubmittedQuery = "";
    let voiceDraft = "";
    const defaultSearchPlaceholder = "Search anything";
    let voicePreviousValue = "";
    let voiceStopRequested = false;
    let locationWatchId = null;
    let bestLocationAccuracy = Number.POSITIVE_INFINITY;
    let locationSettled = false;


    function readHistory() {
      try {
        const parsed = JSON.parse(localStorage.getItem(historyKey) || "[]");
        return Array.isArray(parsed) ? parsed.filter((item) => typeof item === "string") : [];
      } catch {
        return [];
      }
    }

    function writeHistory(items) {
      localStorage.setItem(historyKey, JSON.stringify(items.slice(0, 8)));
    }

    function removeHistoryItem(value) {
      const next = readHistory().filter((item) => item.toLowerCase() !== value.toLowerCase());
      writeHistory(next);
      openDropdown(queryInput.value);
    }

    function saveHistory(query) {
      const value = query.trim();
      if (!value) {
        return;
      }

      const next = [value, ...readHistory().filter((item) => item.toLowerCase() !== value.toLowerCase())];
      writeHistory(next);
    }

    function normalizeLookup(value) {
      return value.trim().toLowerCase();
    }

    function buildSuggestionPool() {
      const combined = [...readHistory(), ...liveSuggestions];
      const seen = new Set();

      return combined.filter((item) => {
        const key = normalizeLookup(item);
        if (!key || seen.has(key)) {
          return false;
        }
        seen.add(key);
        return true;
      });
    }

    function getState(query) {
      const normalized = query.trim().toLowerCase();
      return staticDataset[normalized] || null;
    }

    function updateClearButton() {
      clearButton.classList.toggle("is-visible", Boolean(queryInput.value.trim()));
    }

    function setSearchStatus(message) {
      const value = (message || "").trim();
      statusPill.textContent = value;
      statusPill.classList.toggle("is-visible", Boolean(value));
      resultsHead.style.display = value ? "flex" : "none";
    }

    function setSearchLoading(isLoading, message) {
      searchShell.classList.toggle("is-loading", isLoading);
      searchButton.disabled = isLoading;
      queryInput.disabled = false;
      setSearchStatus(isLoading ? (message || "Searching live web...") : message || "");
    }

    function setVoiceUiState(mode) {
      const visible = mode !== "idle";
      searchShell.classList.toggle("is-voice-mode", visible);
      voiceFeedback.classList.toggle("is-visible", visible);
      voiceStopButton.classList.toggle("is-visible", mode === "recording");
      voiceButton.style.opacity = mode === "recording" ? "0.55" : "1";
      queryInput.placeholder = mode === "recording" ? "Listening..." : defaultSearchPlaceholder;
    }

    function clearVoiceDraft() {
      voiceDraft = "";
      setVoiceUiState("idle");
      updateClearButton();
    }

    function clearAnswerTyping() {
      if (answerTypingTimer) {
        clearTimeout(answerTypingTimer);
        answerTypingTimer = null;
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function splitIntoSentences(text) {
      return (text || "")
        .split(/(?<=[.!?])\s+/)
        .map((sentence) => sentence.trim())
        .map((sentence) => sentence.replace(/^#{1,6}\s*/g, ""))
        .map((sentence) => sentence.replace(/\s+#\s+/g, " "))
        .map((sentence) => sentence.replace(/\s{2,}/g, " ").trim())
        .filter(Boolean);
    }

    function formatOverviewHtml(query, message, sources) {
      const cleanedMessage = (message || "").trim();
      if (!cleanedMessage) {
        return "";
      }

      const sentences = splitIntoSentences(cleanedMessage);
      const summaryText = sentences.slice(0, 2).join(" ") || cleanedMessage;
      const pointItems = (sentences.length > 1 ? sentences : [cleanedMessage])
        .slice(0, 4)
        .map((sentence) => `<li>${escapeHtml(sentence)}</li>`)
        .join("");

      const tableRows = (sources || [])
        .slice(0, 4)
        .map((source, index) => {
          let host = source.url;
          try {
            host = new URL(source.url).hostname.replace(/^www\./, "");
          } catch {
          }

          return `
            <tr>
              <td>${index + 1}</td>
              <td><a href="${escapeHtml(source.url)}" rel="noreferrer noopener">${escapeHtml(source.title || "Untitled source")}</a></td>
              <td>${escapeHtml(host)}</td>
            </tr>
          `;
        })
        .join("");

      return `
        <section class="overview-section">
          <h3 class="overview-heading">Summary</h3>
          <p class="overview-text">${escapeHtml(summaryText)}</p>
        </section>
        <section class="overview-section">
          <h3 class="overview-heading">Key Points</h3>
          <ol class="overview-list">${pointItems}</ol>
        </section>
        ${tableRows ? `
          <section class="overview-section">
            <h3 class="overview-heading">Top Sources</h3>
            <table class="overview-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Source</th>
                  <th>Domain</th>
                </tr>
              </thead>
              <tbody>${tableRows}</tbody>
            </table>
          </section>
        ` : ""}
        <section class="overview-section">
          <h3 class="overview-heading">Query</h3>
          <p class="overview-text"><strong>${escapeHtml(query)}</strong></p>
        </section>
      `;
    }

    function renderOverview(query, message, sources = []) {
      clearAnswerTyping();
      answerTypingToken += 1;
      answerText.innerHTML = formatOverviewHtml(query, message, sources);
    }

    function setSuggestedQuestions(items, currentQuery) {
      const suggestions = [...new Set((items || [])
        .map((item) => typeof item === "string" ? item.trim() : "")
        .filter(Boolean)
        .filter((item) => item.toLowerCase() !== currentQuery.toLowerCase()))]
        .slice(0, 4);

      relatedRow.innerHTML = "";

      if (!suggestions.length) {
        relatedLabel.classList.remove("is-visible");
        relatedRow.classList.remove("is-visible");
        return;
      }

      suggestions.forEach((item) => {
        const button = document.createElement("button");
        button.className = "related-chip";
        button.type = "button";
        button.textContent = item;
        button.addEventListener("click", () => {
          queryInput.value = item;
          queryInput.focus();
          void executeSearch(item);
        });
        relatedRow.appendChild(button);
      });

      relatedLabel.classList.add("is-visible");
      relatedRow.classList.add("is-visible");
    }

    function buildFollowUpQuestions(query, sources) {
      const cleanedQuery = query.trim();
      const sourceTitle = sources[0]?.title || "";
      const shortTopic = sourceTitle || cleanedQuery;

      return [
        `Can you explain ${cleanedQuery} in simple words with a step-by-step example?`,
        `What are the most important facts, benefits, and practical uses related to ${shortTopic}?`,
        `Can you compare different ways to understand or apply ${cleanedQuery} in real life?`,
        `What common mistakes should someone avoid when learning about ${cleanedQuery}?`
      ];
    }

    function getCurrentPositionAsync(options) {
      return new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject, options);
      });
    }

    function stopLocationWatch() {
      if (locationWatchId !== null) {
        navigator.geolocation.clearWatch(locationWatchId);
        locationWatchId = null;
      }
    }

    async function reverseLookupLocation(latitude, longitude, accuracy) {
      try {
        const response = await fetch(`/api/location/reverse?lat=${encodeURIComponent(latitude)}&lng=${encodeURIComponent(longitude)}`);
        if (!response.ok) {
          throw new Error(`Reverse geocode failed with status ${response.status}`);
        }

        const payload = await response.json();
        const topResult = payload.results?.[0];
        if (!topResult) {
          return false;
        }

        const locality = [
          topResult.areaName,
          topResult.cityName,
          topResult.stateName,
          topResult.countryName,
          topResult.pincode
        ].filter(Boolean).join(", ");

        const locationLabel = locality || topResult.formattedAddress || "";
        if (!locationLabel) {
          return false;
        }

        locationText.textContent = locationLabel;
        locationMeta.textContent = `Latitude ${latitude.toFixed(5)}, Longitude ${longitude.toFixed(5)}`;
        return true;
      } catch (error) {
        console.error(error);
        return false;
      }
    }

    async function applyLocationFix(position, options = {}) {
      const { latitude, longitude, accuracy } = position.coords;
      const roundedAccuracy = Math.round(accuracy);
      const shouldUseFix =
        options.force === true
        || accuracy < bestLocationAccuracy - 5
        || !Number.isFinite(bestLocationAccuracy);

      if (!shouldUseFix) {
        return;
      }

      bestLocationAccuracy = accuracy;
      locationText.textContent = `Refining your location...`;
      locationMeta.textContent = `Latitude ${latitude.toFixed(5)}, Longitude ${longitude.toFixed(5)}`;

      const resolved = await reverseLookupLocation(latitude, longitude, accuracy);
      if (!resolved) {
        locationText.textContent = `Latitude ${latitude.toFixed(5)}, Longitude ${longitude.toFixed(5)}`;
      }

      if (accuracy <= 40) {
        locationSettled = true;
        stopLocationWatch();
      }
    }

    async function updateUserLocation() {
      if (!("geolocation" in navigator)) {
        locationText.textContent = "This browser does not support live location.";
        locationMeta.textContent = "";
        return;
      }

      locationText.textContent = "Requesting your current location...";
      locationMeta.textContent = "";
      bestLocationAccuracy = Number.POSITIVE_INFINITY;
      locationSettled = false;
      stopLocationWatch();

      try {
        let position;

        try {
          position = await getCurrentPositionAsync({
            enableHighAccuracy: true,
            timeout: 12000,
            maximumAge: 300000
          });
        } catch (error) {
          if (error.code !== 3) {
            throw error;
          }

          position = await getCurrentPositionAsync({
            enableHighAccuracy: false,
            timeout: 20000,
            maximumAge: 600000
          });
        }

        await applyLocationFix(position, { force: true });

        locationWatchId = navigator.geolocation.watchPosition(
          (watchPosition) => {
            if (locationSettled) {
              stopLocationWatch();
              return;
            }

            void applyLocationFix(watchPosition);
          },
          () => {
          },
          {
            enableHighAccuracy: true,
            timeout: 20000,
            maximumAge: 0
          }
        );

        setTimeout(() => {
          stopLocationWatch();
        }, 30000);
      } catch (error) {
        const errors = {
          1: "Location access was denied in the browser.",
          2: "Your location could not be determined.",
          3: "Location request timed out."
        };

        locationText.textContent = errors[error.code] || "Unable to read your current location.";
        locationMeta.textContent = "";
      }
    }

    function renderResults(query) {
      const value = query.trim();
      if (!value) {
        clearAnswerTyping();
        answerWrap.classList.remove("is-visible");
        resultsEl.innerHTML = "";
        setSuggestedQuestions([], "");
        emptyState.style.display = "block";
        emptyState.textContent = "";
        setSearchStatus("");
        return;
      }

      const state = getState(value);
      if (!state) {
        answerWrap.classList.add("is-visible");
        renderOverview(value, "No cached preview is available for this query.", []);
        citationsEl.innerHTML = "";
        resultsEl.innerHTML = "";
        setSuggestedQuestions(buildFollowUpQuestions(value, []), value);
        emptyState.style.display = "block";
        emptyState.textContent = "Try a live search.";
        return;
      }

      renderOverview(value, state.answer, state.results.map((result) => ({
        title: result.title,
        url: result.url,
        summary: result.snippet
      })));
      citationsEl.innerHTML = "";
      resultsEl.innerHTML = "";

      state.citations.forEach((citation) => {
        const link = document.createElement("a");
        link.className = "citation";
        link.href = citation;
        link.textContent = new URL(citation).hostname;
        link.rel = "noreferrer noopener";
        citationsEl.appendChild(link);
      });

      state.results.forEach((result) => {
        const card = document.createElement("article");
        card.className = "result-card";
        card.innerHTML = `
          <div class="result-url">${result.url}</div>
          <h3 class="result-title"><a href="${result.url}" rel="noreferrer noopener">${result.title}</a></h3>
          <p class="result-snippet">${result.snippet}</p>
        `;
        resultsEl.appendChild(card);
      });

      setSuggestedQuestions(state.relatedQueries, value);

      answerWrap.classList.add("is-visible");
      setSearchStatus("");
      emptyState.style.display = state.results.length === 0 ? "block" : "none";
      emptyState.textContent = state.results.length === 0 ? "No matching results found." : "";
    }

    function renderErrorState(query, message) {
      const value = query.trim();
      answerWrap.classList.add("is-visible");
      renderOverview(value, message || "Search is temporarily unavailable.", []);
      citationsEl.innerHTML = "";
      resultsEl.innerHTML = "";
      setSuggestedQuestions(buildFollowUpQuestions(value, []), value);
      setSearchStatus("Showing fallback response");
      emptyState.style.display = "block";
      emptyState.textContent = value ? `No live results returned for "${value}".` : "Search is temporarily unavailable.";
    }

    function renderLiveResults(query, payload) {
      const sources = Array.isArray(payload.sources) ? payload.sources : [];
      renderOverview(query, payload.final_answer || "insufficient data", sources);
      citationsEl.innerHTML = "";
      resultsEl.innerHTML = "";

      sources.forEach((source) => {
        const link = document.createElement("a");
        link.className = "citation";
        link.href = source.url;
        link.textContent = new URL(source.url).hostname;
        link.rel = "noreferrer noopener";
        citationsEl.appendChild(link);

        const card = document.createElement("article");
        card.className = "result-card";
        card.innerHTML = `
          <div class="result-url">${source.url}</div>
          <h3 class="result-title"><a href="${source.url}" rel="noreferrer noopener">${source.title}</a></h3>
          <p class="result-snippet">${source.summary}</p>
        `;
        resultsEl.appendChild(card);
      });

      setSuggestedQuestions(
        buildFollowUpQuestions(query, sources),
        query
      );

      answerWrap.classList.add("is-visible");
      setSearchStatus(sources.length ? `Live results for "${query}"` : "No strong live sources found");
      emptyState.style.display = sources.length === 0 ? "block" : "none";
      emptyState.textContent = sources.length === 0 ? "No matching results found." : "";
    }

    function getDropdownItems(query) {
      const normalized = query.trim().toLowerCase();
      const suggestionPool = buildSuggestionPool();
      const suggestionMatches = suggestionPool
        .filter((item) => normalized ? item.toLowerCase().startsWith(normalized) : false)
        .slice(0, 8)
        .map((item) => ({ type: "suggestion", text: item }));

      const trendingMatches = !normalized
        ? liveSuggestions.slice(0, 8).map((item) => ({ type: "trending", text: item }))
        : [];

      return {
        history: [],
        suggestions: suggestionMatches,
        trending: trendingMatches
      };
    }

    function closeDropdown() {
      suggestPanel.classList.remove("is-open");
      suggestPanel.innerHTML = "";
      queryInput.setAttribute("aria-expanded", "false");
      activeItems = [];
      activeIndex = -1;
    }

    function closeAttachMenu() {
      attachMenu.classList.remove("is-open");
    }

    function renderGroup(label, items, offset) {
      if (!items.length) {
        return "";
      }

      const renderedItems = items.map((item, index) => `
        <button
          class="suggest-item"
          type="button"
          data-index="${offset + index}"
          data-value="${item.text.replace(/"/g, "&quot;")}"
        >
          <span class="item-icon">${item.type === "history" ? "↻" : item.type === "trending" ? "↗" : "⌕"}</span>
          <span class="item-text">${item.text}</span>
          ${
            item.type === "history"
              ? `<span class="item-type"><span class="history-delete" data-delete="${item.text.replace(/"/g, "&quot;")}" aria-label="Delete history item">×</span></span>`
              : `<span class="item-type">${item.type === "trending" ? "" : item.type}</span>`
          }
        </button>
      `).join("");

      return `
        <div class="suggest-group">
          <span class="suggest-label${label === "Trending searches" ? " trending-label" : ""}">${label}</span>
          ${renderedItems}
        </div>
      `;
    }

    function openDropdown(query) {
      const groups = getDropdownItems(query);
      activeItems = query.trim()
        ? [...groups.suggestions]
        : [...groups.trending];

      if (!activeItems.length) {
        closeDropdown();
        return;
      }

      suggestPanel.innerHTML = query.trim()
        ? renderGroup("Suggestions", groups.suggestions, 0)
        : renderGroup("Trending searches", groups.trending, 0);

      suggestPanel.classList.add("is-open");
      queryInput.setAttribute("aria-expanded", "true");
      activeIndex = -1;

      Array.from(suggestPanel.querySelectorAll(".suggest-item")).forEach((button) => {
        button.addEventListener("click", () => {
          const value = button.getAttribute("data-value") || "";
          queryInput.value = value;
          void executeSearch(value);
        });
      });

      Array.from(suggestPanel.querySelectorAll(".history-delete")).forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          const value = button.getAttribute("data-delete") || "";
          removeHistoryItem(value);
        });
      });
    }

    function updateActiveItem() {
      Array.from(suggestPanel.querySelectorAll(".suggest-item")).forEach((item) => {
        const index = Number(item.getAttribute("data-index"));
        item.classList.toggle("is-active", index === activeIndex);
      });
    }

    async function executeSearch(query) {
      const value = query.trim();
      if (!value) {
        renderResults("");
        closeDropdown();
        updateClearButton();
        return;
      }

      if (searchController) {
        searchController.abort();
      }

      const searchToken = ++activeSearchToken;
      searchController = new AbortController();
      queryInput.value = value;
      updateClearButton();
      saveHistory(value);
      closeDropdown();
      setSearchLoading(true);
      lastSubmittedQuery = value;

      try {
        const response = await fetch(`/api/search?q=${encodeURIComponent(value)}`, {
          signal: searchController.signal
        });
        if (!response.ok) {
          throw new Error(`Search request failed with status ${response.status}`);
        }

        const payload = await response.json();
        if (searchToken !== activeSearchToken) {
          return;
        }
        renderLiveResults(value, payload);
      } catch (error) {
        if (error.name === "AbortError") {
          return;
        }

        const cachedState = getState(value);
        if (cachedState) {
          renderResults(value);
          setSearchStatus("Live search timed out. Showing local preview");
          return;
        }

        console.error(error);
        renderErrorState(value, "Live search could not complete.");
      } finally {
        if (searchToken === activeSearchToken) {
          searchController = null;
          setSearchLoading(false, statusPill.textContent);
        }
      }
    }

    queryInput.addEventListener("focus", () => {
      openDropdown(queryInput.value);
    });

    queryInput.addEventListener("input", () => {
      updateClearButton();
      if (queryInput.value.trim()) {
        openDropdown(queryInput.value);
      } else {
        openDropdown("");
        setSearchStatus(lastSubmittedQuery ? `Last search: ${lastSubmittedQuery}` : "");
      }
    });

    queryInput.addEventListener("keydown", (event) => {
      if (event.key === "ArrowDown" && activeItems.length) {
        event.preventDefault();
        activeIndex = Math.min(activeIndex + 1, activeItems.length - 1);
        updateActiveItem();
        return;
      }

      if (event.key === "ArrowUp" && activeItems.length) {
        event.preventDefault();
        activeIndex = Math.max(activeIndex - 1, 0);
        updateActiveItem();
        return;
      }

      if (event.key === "Enter") {
        event.preventDefault();
        if (activeIndex >= 0 && activeItems[activeIndex]) {
          queryInput.value = activeItems[activeIndex].text;
        }
        void executeSearch(queryInput.value);
      }

      if (event.key === "Escape") {
        closeDropdown();
      }
    });

    document.addEventListener("click", (event) => {
      if (!event.target.closest(".search-stage")) {
        closeDropdown();
        closeAttachMenu();
      }
    });

    async function loadTrendingTopics() {
      try {
        const response = await fetch("/api/trending");
        if (!response.ok) {
          throw new Error(`Trending request failed with status ${response.status}`);
        }

        const payload = await response.json();
        liveSuggestions = Array.isArray(payload.topics) ? payload.topics : [];
      } catch (error) {
        console.error(error);
        liveSuggestions = [];
      }

    }

    voiceButton.addEventListener("click", () => {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        alert("Voice search is not supported in this browser.");
        queryInput.focus();
        return;
      }

      if (recognition) {
        recognition.stop();
        return;
      }

      voicePreviousValue = queryInput.value;
      voiceDraft = "";
      voiceStopRequested = false;
      queryInput.value = "";
      updateClearButton();
      recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      setVoiceUiState("recording");

      recognition.onresult = (event) => {
        for (let index = event.resultIndex; index < event.results.length; index += 1) {
          const transcript = event.results[index][0]?.transcript || "";
          if (event.results[index].isFinal) {
            voiceDraft = `${voiceDraft} ${transcript}`.trim();
          }
        }
      };

      recognition.onerror = () => {
        recognition = null;
        const transcript = voiceDraft.trim();
        if (transcript) {
          queryInput.value = transcript;
        } else {
          queryInput.value = voicePreviousValue;
        }
        clearVoiceDraft();
      };

      recognition.onend = () => {
        recognition = null;
        const transcript = voiceDraft.trim();
        if (transcript) {
          queryInput.value = transcript;
          updateClearButton();
          queryInput.focus();
        } else {
          queryInput.value = voicePreviousValue;
        }
        voicePreviousValue = "";
        voiceStopRequested = false;
        clearVoiceDraft();
      };

      recognition.start();
    });

    voiceStopButton.addEventListener("click", () => {
      if (recognition) {
        voiceStopRequested = true;
        setVoiceUiState("idle");
        recognition.stop();
      }
    });

    attachButton.addEventListener("click", (event) => {
      event.stopPropagation();
      attachMenu.classList.toggle("is-open");
    });

    clearButton.addEventListener("click", () => {
      if (searchController) {
        searchController.abort();
        searchController = null;
      }
      if (recognition) {
        recognition.stop();
      }
      clearVoiceDraft();
      activeSearchToken += 1;
      queryInput.value = "";
      updateClearButton();
      setSearchLoading(false, "");
      renderResults("");
      queryInput.focus();
    });

    searchButton.addEventListener("click", () => {
      void executeSearch(queryInput.value);
    });

    uploadImageButton.addEventListener("click", () => {
      closeAttachMenu();
      imagePicker.click();
    });

    uploadFileButton.addEventListener("click", () => {
      closeAttachMenu();
      filePicker.click();
    });

    function handlePickedFiles(files) {
      if (!files.length) {
        return;
      }

      const summary =
        files.length === 1
          ? `Analyze file: ${files[0].name}`
          : `Analyze files: ${files.length} selected`;

      queryInput.value = summary;
      void executeSearch(summary);
    }

    imagePicker.addEventListener("change", () => {
      const files = Array.from(imagePicker.files || []);
      handlePickedFiles(files);
      imagePicker.value = "";
    });

    filePicker.addEventListener("change", () => {
      const files = Array.from(filePicker.files || []);
      handlePickedFiles(files);
      filePicker.value = "";
    });

    renderResults("");
    closeDropdown();
    updateClearButton();
    void loadTrendingTopics();
    void updateUserLocation();
  </script>
</body>
</html>
